nelmio_api_doc:
    documentation:
        info:
            title: 'User Microservice API'
            description: 'Event-driven microservice with RabbitMQ, Kafka, and JWT authentication'
            version: '1.0.0'
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - Bearer: []
    areas:
        path_patterns:
            - ^/api(?!/doc)
